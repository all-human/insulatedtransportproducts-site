<?xml version='1.0' encoding='utf-8' ?>
<!DOCTYPE html PUBLIC '-//W3C//DTD XHTML 1.0 Strict//EN'   'http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd'>
<html xmlns='http://www.w3.org/1999/xhtml' xml:lang='en' lang='en'>
<head>
	<meta http-equiv='Content-Type' content='text/html; charset=utf-8' />
	<meta http-equiv='Content-Style-Type' content='text/css' />
	<meta http-equiv='Content-Script-Type' content='text/javascript' />
	<title></title>
	<style type="text/css">
		body
		{
			margin: 0;
			padding: 0;
			background-color: #000000;
			height: 36px;
			width: 100%;
		}
		html
		{
			margin: 0;
			padding: 0;
			height: 36px;
			width: 100%;
		}
	</style>
	<link href="static/audiojs/style-dark-responsive.css" rel="stylesheet" type="text/css" media="screen" />
	<script src="static/audiojs/audio.min.js" type="text/javascript"></script>
	<script type='text/javascript'>
		function getQuerystring(key, default_) {
			if (default_ == null) default_ = "";
			key = key.replace(/[\[]/, "\\\[").replace(/[\]]/, "\\\]");
			var regex = new RegExp("[\\?&]" + key + "=([^&#]*)");
			var qs = regex.exec(window.location.href);
			if (qs == null)
				return default_;
			else
				return qs[1];
		}
		function initAudioPlayer() {
			var af = getQuerystring('audiofile');
			var auplayer = '<audio src="' + decodeURIComponent(af) + '" preload="auto" />';
			document.getElementById("audioplayer").innerHTML = auplayer;
			audiojs.events.ready(function () {
				var as = audiojs.createAll();
			});
		}
		window.onload = initAudioPlayer;

	</script>
</head>
<body>
	<div id='audioplayer'>
	</div>
</body>
</html>
