name: Deploy DNN Site to Azure

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-itp-dnn
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_DNN }}
          package: .
